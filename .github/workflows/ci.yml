name: DevSecOps Pipeline (Cloud)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # 1. Tests unitaires + couverture
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test

      - name: Sauvegarder la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # 2. SonarQube Cloud (SAST & qualite du code)
  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Recuperer la couverture
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=armorialofficiel
            -Dsonar.projectKey=ArmorialOfficiel_webapp
  # 3. Trivy - scan des dependances (SCA)
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan du systeme de fichiers
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

# 4. Build de l'image Docker
  build-image:
    needs: dependency-scan  # Petit conseil : change sonar-check par dependency-scan pour que les jobs s'enchaînent proprement
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Connexion au dépôt de code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/armorialofficiel/webapp:latest

# 5. Trivy - scan de l'image (conteneur)
  container-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Nom de l'image en minuscules
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/webapp" >> "$GITHUB_ENV"

      - name: Scan de l'image Docker depuis GHCR
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
